name: Jules Weekly Cleanup

on:
  schedule:
    - cron: "0 19 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: jules-weekly-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      JULES_API_KEY: ${{ secrets.JULES_API_KEY || secrets.JULES_API_KEY_1 || secrets.JULES_API_KEY_2 || secrets.JULES_API_KEY_3 }}

    steps:
      - name: Skip when no Jules API key is configured
        if: ${{ env.JULES_API_KEY == '' }}
        run: echo "JULES_API_KEY is not configured; skipping Jules invocation."

      - name: Invoke Jules
        if: ${{ env.JULES_API_KEY != '' }}
        uses: google-labs-code/jules-invoke@v1
        with:
          prompt: |
            You are doing a low-risk weekly cleanup pass on OpenClaw Assistant.

            Priorities:
            - Remove dead code, stale comments, and small duplications that increase maintenance cost.
            - Tighten or add focused tests for existing behavior when there is an obvious gap.
            - Clean up GitHub workflow or build-script duplication only when the change is small and clearly improves maintainability.
            - Improve naming or local structure where it reduces confusion without changing user-facing behavior.

            Constraints:
            - Keep the PR small and reviewable.
            - Avoid broad UI redesigns, architecture rewrites, dependency upgrades, or feature work.
            - Do not touch release signing, release secrets, or external service credentials.
            - Preserve privacy-sensitive behavior around gateway auth, encrypted settings, and Android permissions.

            Validation:
            - Use the same Firebase-stub bootstrap strategy as `.github/workflows/ci.yml` when running Gradle without secrets.
            - Run `./gradlew lintStandardDebug`
            - Run `./gradlew testStandardDebugUnitTest`
            - If you touch build outputs, also run `./gradlew assembleStandardDebug`
          jules_api_key: ${{ env.JULES_API_KEY }}
          starting_branch: main
          include_commit_log: true
